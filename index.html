<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style> body { -webkit-tap-highlight-color: transparent; } </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-24 text-left">
  <div class="max-w-md mx-auto p-5">
    
    <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100 mb-6">
      <div class="mb-4">
        <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">แคลอรี่ที่เหลือ</h2>
        <div class="flex items-baseline gap-2">
          <span id="remain-cal" class="text-6xl font-black text-slate-800">0</span>
          <span class="text-lg font-bold text-slate-300">kcal</span>
        </div>
      </div>
      <div class="flex justify-between pt-6 border-t border-slate-50">
        <div><div id="target-cal" class="font-bold text-slate-800">0</div><div class="text-[10px] text-slate-400">เป้าหมาย</div></div>
        <div><div id="food-cal" class="font-bold text-blue-600">0</div><div class="text-[10px] text-slate-400">กินแล้ว</div></div>
      </div>
    </div>

    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-4">
      <div class="mb-4">
        <div class="flex justify-between items-end mb-2">
          <span class="text-xs font-black text-slate-400 uppercase">Protein (Goal <span id="pro-tar">0</span>g)</span>
          <span class="text-sm font-bold text-orange-500"><span id="pro-cur">0</span>g</span>
        </div>
        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
          <div id="pro-bar" class="bg-orange-500 h-full transition-all" style="width:0%"></div>
        </div>
      </div>
      
      <div class="grid grid-cols-2 gap-4 border-t border-slate-50 pt-4">
        <div>
          <div class="flex justify-between items-end mb-1">
            <span class="text-[10px] font-black text-slate-400 uppercase">Carbs</span>
            <span class="text-xs font-bold text-blue-500"><span id="carb-cur">0</span>g</span>
          </div>
          <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
            <div id="carb-bar" class="bg-blue-400 h-full transition-all" style="width:0%"></div>
          </div>
        </div>
        <div>
          <div class="flex justify-between items-end mb-1">
            <span class="text-[10px] font-black text-slate-400 uppercase">Fat</span>
            <span class="text-xs font-bold text-yellow-500"><span id="fat-cur">0</span>g</span>
          </div>
          <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
            <div id="fat-bar" class="bg-yellow-400 h-full transition-all" style="width:0%"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-8">
      <div class="flex justify-between items-center">
        <div>
          <h3 class="text-xs font-bold text-slate-400 uppercase">น้ำดื่ม (ลิตร)</h3>
          <div class="text-2xl font-black text-blue-500"><span id="water-cur">0</span> / <span id="water-tar">0</span></div>
        </div>
        <div class="flex gap-2">
          <button onclick="logWater(-0.25)" class="w-10 h-10 rounded-full bg-slate-100 text-slate-600 font-bold">-</button>
          <button onclick="logWater(0.25)" class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 font-bold">+</button>
        </div>
      </div>
    </div>

    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-8">
      <h3 class="text-xs font-bold text-slate-400 uppercase mb-4">สถิติแคลอรี่ 7 วัน</h3>
      <canvas id="mainChart" height="150"></canvas>
    </div>

    <div class="grid grid-cols-3 gap-3">
      <button onclick="startScan()" class="bg-slate-900 text-white p-4 rounded-2xl font-bold shadow-lg flex flex-col items-center justify-center">
        <i class="fa-solid fa-barcode text-xl mb-1"></i>
        <span class="text-[10px] uppercase">สแกน</span>
      </button>
      <button onclick="showManualFood()" class="bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg flex flex-col items-center justify-center">
        <i class="fa-solid fa-pen text-xl mb-1"></i>
        <span class="text-[10px] uppercase">บันทึก</span>
      </button>
      <button onclick="logWeight()" class="bg-white text-slate-900 p-4 rounded-2xl font-bold shadow-sm border border-slate-200 flex flex-col items-center justify-center">
        <i class="fa-solid fa-weight-scale text-xl mb-1"></i>
        <span class="text-[10px] uppercase">น้ำหนัก</span>
      </button>
    </div>

  </div>

  <div id="scannerModal" class="fixed inset-0 bg-black z-50 hidden">
    <div id="reader"></div>
    <button onclick="stopScan()" class="absolute bottom-10 left-1/2 -translate-x-1/2 bg-white px-8 py-3 rounded-full font-bold">ปิดสแกนเนอร์</button>
  </div>

  <script>
    let myChart;
    let currentActiveMeal = "ทั่วไป"; // เก็บข้อมูลมื้ออาหารปัจจุบัน

    window.onload = () => {
      const cached = localStorage.getItem('proData');
      if(cached) updateUI(JSON.parse(cached));
      refresh();
    };

    function refresh() {
      google.script.run.withSuccessHandler(data => {
        localStorage.setItem('proData', JSON.stringify(data));
        updateUI(data);
      }).getDashboardData();
    }

    function updateUI(data) {
      currentActiveMeal = data.currentMeal || "ทั่วไป"; // รับค่ามื้ออาหารจากระบบหลังบ้าน

      // อัปเดตแคลอรี่
      const remain = data.targets.cal - data.food.cal;
      document.getElementById('remain-cal').innerText = remain.toLocaleString();
      document.getElementById('target-cal').innerText = data.targets.cal;
      document.getElementById('food-cal').innerText = data.food.cal;
      
      // อัปเดต Protein
      document.getElementById('pro-cur').innerText = Math.round(data.food.pro);
      document.getElementById('pro-tar').innerText = data.targets.pro;
      document.getElementById('pro-bar').style.width = Math.min((data.food.pro/data.targets.pro*100), 100) + '%';
      
      // คำนวณเป้าหมาย Carbs และ Fat โดยประมาณ (Body Recomposition)
      const fatTarget = Math.round(data.weight.current) || 60; // ไขมัน 1g / น้ำหนัก 1kg
      const carbTarget = Math.round((data.targets.cal - (data.targets.pro * 4) - (fatTarget * 9)) / 4) || 200;

      // อัปเดต Carbs & Fat
      document.getElementById('carb-cur').innerText = Math.round(data.food.carb);
      document.getElementById('carb-bar').style.width = Math.min((data.food.carb/carbTarget*100), 100) + '%';
      
      document.getElementById('fat-cur').innerText = Math.round(data.food.fat);
      document.getElementById('fat-bar').style.width = Math.min((data.food.fat/fatTarget*100), 100) + '%';

      // อัปเดตน้ำดื่ม
      document.getElementById('water-cur').innerText = data.water.current.toFixed(2);
      document.getElementById('water-tar').innerText = data.water.target;
      
      renderChart(data.chart);
    }

    function renderChart(c) {
      const ctx = document.getElementById('mainChart');
      if(myChart) myChart.destroy();
      myChart = new Chart(ctx, { 
        type: 'bar', 
        data: { 
          labels: c.labels, 
          datasets: [{ label:'Calories', data: c.data, backgroundColor: '#3b82f6', borderRadius: 6 }] 
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
      });
    }

    // ฟังก์ชันเพิ่มอาหารแบบ Manual
    function showManualFood() {
      const name = prompt(`เพิ่มอาหาร (มื้อ${currentActiveMeal})\nชื่ออาหาร:`);
      if(!name) return;
      const pro = prompt("โปรตีน (g):", "0") || 0;
      const carb = prompt("คาร์โบไฮเดรต (g):", "0") || 0;
      const fat = prompt("ไขมัน (g):", "0") || 0;
      const cal = prompt("แคลอรี่ (kcal):", "0") || 0;
      
      // บันทึกพร้อมแนบมื้ออาหารปัจจุบันไปลง Sheet
      google.script.run.withSuccessHandler(refresh).saveLog('Logs', [currentActiveMeal, name, pro, carb, fat, cal]);
    }

    function logWater(amt) { google.script.run.withSuccessHandler(refresh).saveLog('WaterLogs', [amt]); }
    
    function logWeight() {
      const w = prompt("อัปเดตน้ำหนักวันนี้ (kg):");
      if(w) google.script.run.withSuccessHandler(refresh).saveWeightAndUpdate(parseFloat(w));
    }

    // ระบบสแกน
    let scanner;
    function startScan() {
      document.getElementById('scannerModal').classList.remove('hidden');
      scanner = new Html5Qrcode("reader");
      scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
        stopScan();
        google.script.run.withSuccessHandler(onFoodFound).searchBarcode(txt);
      });
    }

    function stopScan() {
      if(scanner) scanner.stop();
      document.getElementById('scannerModal').classList.add('hidden');
    }
    
    function onFoodFound(f) {
      if(f.found) {
        if(confirm(`พบ: ${f.name}\nโปรตีน: ${f.pro}g | คาร์บ: ${f.carb}g | ไขมัน: ${f.fat}g | แคล: ${f.cal}kcal\nบันทึกเป็นมื้อ${currentActiveMeal} เลยไหม?`)) {
          google.script.run.withSuccessHandler(refresh).saveLog('Logs', [currentActiveMeal, f.name, f.pro, f.carb, f.fat, f.cal]);
        }
      } else {
        alert("ไม่พบข้อมูลบาร์โค้ดนี้ กรุณาบันทึกแบบป้อนข้อมูลเองครับ");
      }
    }
  </script>
</body>
</html>
